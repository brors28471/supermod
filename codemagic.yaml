workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "AgarIOMenu.xcodeproj"
        XCODE_SCHEME: "AgarIOMenu"
    scripts:
      - name: Build
        script: |
          xcodebuild build \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/DerivedData/Build/Products/Release-iphoneos/**/*.app
    publishing:
      email:
        recipients:
          - dylan10sachs@gmail.com
        notify:
          success: true
          failure: true
