workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "AgarIOMenu.xcodeproj"
        XCODE_SCHEME: "AgarIOMenu"
        BUNDLE_ID: "com.dtje029.agaromenu"
    scripts:
      - name: Install dependencies
        script: |
          cd $CM_BUILD_DIR
          ls -la
      - name: Build for iOS
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Build/Products/Release-iphoneos/**/*.app
    publishing:
      email:
        recipients:
          - dylan10sachs@gmail.com
        notify:
          success: true
          failure: true
