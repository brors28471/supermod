workflows:
  react-native-ios:
    name: React Native iOS
    instance_type: mac_mini_m1
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          npm install -g expo-cli eas-cli
          npm install
      - name: Build iOS app
        script: |
          npx expo export:embed
          npx expo prebuild --platform ios
          xcodebuild -workspace ios/agariomenu.xcworkspace -scheme agariomenu -configuration Release -sdk iphoneos -derivedDataPath ios/build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO || xcodebuild -project ios/agariomenu.xcodeproj -scheme agariomenu -configuration Release -sdk iphoneos -derivedDataPath ios/build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Create IPA
        script: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/ || cp -r ios/build/Build/Products/Release-iphoneos/agariomenu.app Payload/
          zip -r AgarIOMenu.ipa Payload
          rm -rf Payload
    artifacts:
      - AgarIOMenu.ipa
    publishing:
      email:
        recipients:
          - dylan10sachs@gmail.com
        notify:
          success: true
          failure: true
