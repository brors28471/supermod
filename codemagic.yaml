workflows:
  react-native-ios:
    name: React Native iOS
    instance_type: mac_mini_m1
    environment:
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Create simple IPA
        script: |
          # Create a basic iOS app structure
          mkdir -p Payload/AgarIOMenu.app
          
          # Copy app files
          cp -r node_modules Payload/AgarIOMenu.app/ || true
          cp App.js Payload/AgarIOMenu.app/ || true
          cp app.json Payload/AgarIOMenu.app/ || true
          cp package.json Payload/AgarIOMenu.app/ || true
          
          # Create Info.plist with SharkMod bundle ID
          cat > Payload/AgarIOMenu.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>AgarIOMenu</string>
              <key>CFBundleIdentifier</key>
              <string>com.miniclip.agar.io.shark</string>
              <key>CFBundleName</key>
              <string>AgarIOMenu</string>
              <key>CFBundleDisplayName</key>
              <string>AgarIOMenu</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF
          
          # Create IPA
          zip -r AgarIOMenu.ipa Payload
          ls -la AgarIOMenu.ipa
    artifacts:
      - AgarIOMenu.ipa
    publishing:
      email:
        recipients:
          - dylan10sachs@gmail.com
        notify:
          success: true
          failure: true
