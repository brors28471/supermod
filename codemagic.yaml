workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "AgarIOMenu.xcodeproj"
        XCODE_SCHEME: "AgarIOMenu"
        BUNDLE_ID: "com.dtje029.agaromenu"
    scripts:
      - name: Build iOS App
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Create IPA
        script: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/AgarIOMenu.app Payload/
          zip -r AgarIOMenu.ipa Payload
          rm -rf Payload
    artifacts:
      - AgarIOMenu.ipa
    publishing:
      email:
        recipients:
          - dylan10sachs@gmail.com
        notify:
          success: true
          failure: true
