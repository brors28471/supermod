workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    scripts:
      - name: Create Xcode Project
        script: |
          # Create a simple iOS app structure
          mkdir -p build/Payload/AgarIOMenu.app
          
          # Create Info.plist
          cat > build/Payload/AgarIOMenu.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>AgarIOMenu</string>
              <key>CFBundleIdentifier</key>
              <string>com.dtje029.agaromenu</string>
              <key>CFBundleName</key>
              <string>AgarIOMenu</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF
          
          # Create IPA
          cd build
          zip -r ../AgarIOMenu.ipa Payload
          cd ..
          ls -la AgarIOMenu.ipa
      
    artifacts:
      - AgarIOMenu.ipa
    publishing:
      email:
        recipients:
          - dylan10sachs@gmail.com
        notify:
          success: true
          failure: true
